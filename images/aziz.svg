  <!-- Body silhouette -->
  <ellipse cx="60" cy="95" rx="30" ry="26" fill="rgba(255,255,255,0.45)"/>
  <!-- Ring glow -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Camera icon hint (replace me) -->
  <text x="60" y="116" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">tap to change</text>
